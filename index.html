<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Connect to Matter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;590&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #e8e8e8;
      font-family: "Inter", -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 393px;
      height: 852px;
      background: #f6f6f6;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      height: 54px;
      padding: 0 28px;
      flex-shrink: 0;
    }

    .status-time {
      font-family: "SF Pro Display", "Inter", sans-serif;
      font-weight: 590;
      font-size: 17px;
      line-height: 22px;
      color: rgba(0, 0, 0, 0.9);
      padding-top: 13px;
      font-variation-settings: "wdth" 100;
    }

    .status-levels {
      display: flex;
      align-items: flex-end;
      padding-top: 14px;
    }

    .status-levels img {
      height: 14px;
      display: block;
    }

    /* Navigation Bar */
    .nav-bar {
      display: flex;
      align-items: center;
      height: 50px;
      padding: 0 4px;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      width: 96px;
      padding-left: 12px;
      padding-top: 11px;
      padding-bottom: 11px;
    }

    .back-button {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .back-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-icon img {
      width: 100%;
      height: 100%;
    }

    .nav-title {
      flex: 1;
      text-align: center;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: rgba(0, 0, 0, 0.9);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-right {
      width: 96px;
      height: 100%;
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 32px;
      gap: 24px;
      overflow-y: auto;
    }

    .logo-icon {
      width: 231px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .device-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .device-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 16px;
      background: #ffffff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .device-item:active {
      background: #f0f0f0;
    }

    .device-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .device-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .device-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .device-name {
      font-weight: 400;
      font-size: 16px;
      line-height: 22px;
      color: rgba(0, 0, 0, 0.9);
    }

    .device-action {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .action-label {
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: rgba(0, 0, 0, 0.54);
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .arrow-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .arrow-icon img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-time">9:41</div>
      <div class="status-levels">
        <img src="assets/levels.svg" alt="Signal levels">
      </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
      <div class="nav-left">
        <div class="back-button">
          <div class="back-icon">
            <img src="assets/chevron.svg" alt="Back">
          </div>
        </div>
      </div>
      <div class="nav-title">Connect to Matter</div>
      <div class="nav-right"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Logo -->
      <div class="logo-icon">
        <img src="assets/logo_profile_icon.png" alt="X-SENSE Logo">
      </div>

      <!-- Device List -->
      <div class="device-list">
        <!-- Apple Home -->
        <div class="device-item">
          <div class="device-icon">
            <img src="assets/apple_home.png" alt="Apple Home">
          </div>
          <div class="device-info">
            <div class="device-name">Apple Home</div>
          </div>
          <div class="device-action">
            <span class="action-label">Connect</span>
            <div class="arrow-icon">
              <img src="assets/arrow.svg" alt=">">
            </div>
          </div>
        </div>

        <!-- Google Home -->
        <div class="device-item">
          <div class="device-icon">
            <img src="assets/google_home.png" alt="Google Home">
          </div>
          <div class="device-info">
            <div class="device-name">Google Home</div>
          </div>
          <div class="device-action">
            <span class="action-label">Connect</span>
            <div class="arrow-icon">
              <img src="assets/arrow.svg" alt=">">
            </div>
          </div>
        </div>

        <!-- Alexa -->
        <div class="device-item">
          <div class="device-icon">
            <img src="assets/alexa.png" alt="Alexa">
          </div>
          <div class="device-info">
            <div class="device-name">Alexa</div>
          </div>
          <div class="device-action">
            <span class="action-label">Connect</span>
            <div class="arrow-icon">
              <img src="assets/arrow.svg" alt=">">
            </div>
          </div>
        </div>

        <!-- Smartings -->
        <div class="device-item">
          <div class="device-icon">
            <img src="assets/smartings.png" alt="Smartings">
          </div>
          <div class="device-info">
            <div class="device-name">Smartings</div>
          </div>
          <div class="device-action">
            <span class="action-label">Connect</span>
            <div class="arrow-icon">
              <img src="assets/arrow.svg" alt=">">
            </div>
          </div>
        </div>

        <!-- Home Assistant -->
        <div class="device-item">
          <div class="device-icon">
            <img src="assets/home_assistant.png" alt="Home Assistant">
          </div>
          <div class="device-info">
            <div class="device-name">Home Assistant</div>
          </div>
          <div class="device-action">
            <span class="action-label">Connect</span>
            <div class="arrow-icon">
              <img src="assets/arrow.svg" alt=">">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
